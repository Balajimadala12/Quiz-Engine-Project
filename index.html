<!DOCTYPE html>
<html>

<head>

<title>Automated Quiz Engine</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="container">

<h1>Automated Quiz Engine</h1>

<div id="startBox">


<input type="text" id="username" placeholder="Enter Your Name">

<input type="text" id="VTUNo"   placeholder="Enter Your Vtu ">

<input type="text" id="Slot"    placeholder="Enter your Slot no">

<input type="text" id="Semester" placeholder="WS2526" readonly>

<br><br>

<button onclick="startQuiz()">Start Quiz</button>

</div>


<div id="quizBox" style="display:none">

<div class="top">

<span id="questionNumber"></span>

<span id="timer">30</span>

</div>

<div class="progress-container">
<div id="progressBar"></div>
</div>

<h2 id="question"></h2>

<div id="answers"></div>

<div class="navigation">

<button id="backBtn" onclick="previousQuestion()">⬅ Back</button>

<button id="nextBtn" onclick="nextQuestion()">Next ➡</button>

</div>

</div>


<div id="resultBox" style="display:none">

<h2>Quiz Completed 🎉</h2>

<p id="score"></p>

<button onclick="downloadCertificate()">Download Certificate</button>

</div>

</div>

<!-- FIREBASE CONNECTION -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLpGMD_7UUSQSncFuvmf88rgt0TFbeWyw",
  authDomain: "quiz-engine-d36d9.firebaseapp.com",
  projectId: "quiz-engine-d36d9",
  storageBucket: "quiz-engine-d36d9.firebasestorage.app",
  messagingSenderId: "909409022499",
  appId: "1:909409022499:web:a527fb4b636035cfb83796"
};

const app = initializeApp(firebaseConfig);

window.db = getFirestore(app);
window.collection = collection;
window.addDoc = addDoc;

</script>

<script src="script.js"></script>

</body>

</html>
